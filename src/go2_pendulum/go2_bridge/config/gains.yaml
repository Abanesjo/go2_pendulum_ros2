go2_bridge_node:
  ros__parameters:
    enable_crc: true
    # Match the robot-side endpoint QoS reported by `ros2 topic info -v`:
    # /lowstate publisher is reliable, /lowcmd subscriber is best-effort.
    # Local bridge/controller topics still use best-effort QoS.
    unitree_lowstate_qos_reliability: reliable
    unitree_lowcmd_qos_reliability: best_effort
    unitree_qos_depth: 10
    lowcmd_publish_rate_hz: 500.0
    # Causal latest-sample Savitzky-Golay filter at Vicon rate
    sg_window_length: 7
    sg_poly_order: 2
    sg_delta: 0.004166666666666667  # 1/240 Hz
    max_update_rate_hz: 240.0
    # URDF pendulum_base_joint origin relative to base link
    pendulum_hinge_offset: [-0.05, 0.0, 0.06]
    # Standup gains (used during standup phase, higher stiffness)
    standup_kp: 60.0
    standup_kd: 5.0
    # Default leg targets used after terminal emergency damping latches.
    damping_default_joint_pos:
      FR_hip_joint:   -0.1
      FR_thigh_joint:  0.8
      FR_calf_joint:  -1.5
      FL_hip_joint:    0.1
      FL_thigh_joint:  0.8
      FL_calf_joint:  -1.5
      RR_hip_joint:   -0.1
      RR_thigh_joint:  1.0
      RR_calf_joint:  -1.5
      RL_hip_joint:    0.1
      RL_thigh_joint:  1.0
      RL_calf_joint:  -1.5
    # Policy gains (per-joint, matching RL training config)
    gains:
      FR_hip_joint:    {kp: 25.0, kd: 0.6}
      FR_thigh_joint:  {kp: 25.0, kd: 0.6}
      FR_calf_joint:   {kp: 25.0, kd: 0.6}
      FL_hip_joint:    {kp: 25.0, kd: 0.6}
      FL_thigh_joint:  {kp: 25.0, kd: 0.6}
      FL_calf_joint:   {kp: 25.0, kd: 0.6}
      RR_hip_joint:    {kp: 25.0, kd: 0.6}
      RR_thigh_joint:  {kp: 25.0, kd: 0.6}
      RR_calf_joint:   {kp: 25.0, kd: 0.6}
      RL_hip_joint:    {kp: 25.0, kd: 0.6}
      RL_thigh_joint:  {kp: 25.0, kd: 0.6}
      RL_calf_joint:   {kp: 25.0, kd: 0.6}

go2_bridge_passive_node:
  ros__parameters:
    # Causal latest-sample Savitzky-Golay filter at Vicon rate
    sg_window_length: 7
    sg_poly_order: 2
    sg_delta: 0.004166666666666667  # 1/240 Hz
    # URDF pendulum_base_joint origin relative to base link
    pendulum_hinge_offset: [-0.05, 0.0, 0.06]
    # Rate at which /joint_states is published when robot is deactivated
    joint_states_rate: 50.0
    # Crouched pose for leg joints (robot folded on ground)
    default_joint_pos:
      FR_hip_joint:    0.0
      FR_thigh_joint:  1.3
      FR_calf_joint:  -2.5
      FL_hip_joint:    0.0
      FL_thigh_joint:  1.3
      FL_calf_joint:  -2.5
      RR_hip_joint:    0.0
      RR_thigh_joint:  1.3
      RR_calf_joint:  -2.5
      RL_hip_joint:    0.0
      RL_thigh_joint:  1.3
      RL_calf_joint:  -2.5
