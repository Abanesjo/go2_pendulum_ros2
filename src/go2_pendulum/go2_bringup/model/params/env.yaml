          - joint
          armature: 0.0
          frictionloss: null
          viscous_damping: null
          delay_min_lag: 0
          delay_max_lag: 0
          delay_hold_prob: 0.0
          delay_update_period: 0
          delay_per_env_phase: true
          stiffness: 25.0
          damping: 0.6
          effort_limit: 23.5
        soft_joint_pos_limit_factor: 0.9
      sort_actuators: false
      lights: !!python/tuple []
      cameras: !!python/tuple []
      textures: !!python/tuple []
      materials: !!python/tuple []
      collisions: !!python/tuple
      - geom_names_expr: !!python/tuple
        - .*_collision
        contype: 1
        conaffinity: 1
        condim:
          ^[FR][LR]_foot_collision$: 6
          .*_collision: 1
        priority:
          ^[FR][LR]_foot_collision$: 1
        friction:
          ^[FR][LR]_foot_collision$: !!python/tuple
          - 1.0
          - 0.005
          - 0.0005
        solref: !!python/tuple
        - 0.01
        - 1
        solimp: null
        margin: null
        gap: null
        solmix: null
        disable_other_geoms: true
  sensors: !!python/tuple
  - name: feet_ground_contact
    primary:
      mode: geom
      pattern: !!python/tuple
      - FR_foot_collision
      - FL_foot_collision
      - RR_foot_collision
      - RL_foot_collision
      entity: robot
      exclude: !!python/tuple []
    secondary:
      mode: body
      pattern: terrain
      entity: null
      exclude: !!python/tuple []
    fields: !!python/tuple
    - found
    - force
    reduce: netforce
    num_slots: 1
    secondary_policy: first
    track_air_time: true
    global_frame: false
    history_length: 0
    debug: false
  - name: base_contact
    primary:
      mode: body
      pattern: base_link
      entity: robot
      exclude: !!python/tuple []
    secondary:
      mode: body
      pattern: terrain
      entity: null
      exclude: !!python/tuple []
    fields: !!python/tuple
    - found
    - force
    reduce: netforce
    num_slots: 1
    secondary_policy: first
    track_air_time: false
    global_frame: false
    history_length: 0
    debug: false
  - name: pendulum_contact
